version: '3.8'

services:
  mysql:
    image: mysql:8.0-debian
    container_name: bankops-mysql
    environment:
      MYSQL_ROOT_PASSWORD: bankops123
      MYSQL_DATABASE: bankopsdb
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend/bankops-backend
    container_name: bankops-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/bankopsdb
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: bankops123
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    build: ./frontend/bankops-frontend
    container_name: bankops-frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mysql_data: